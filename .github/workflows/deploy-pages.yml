name: Deploy App to GitHub Pages

# Baut nichts (statische Seite) - laedt den Ordner app/ als Pages-Artefakt hoch.
on:
  push:
    branches: [ "claude/evolutionary-tamagotchi-game-hmcpby", "main" ]
    paths: [ "app/**", ".github/workflows/deploy-pages.yml" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "app"
      - id: deployment
        uses: actions/deploy-pages@v4
